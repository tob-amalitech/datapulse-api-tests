name: API Tests + Allure Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      publish_only:
        description: 'Skip tests and just publish existing results'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  # Set PUBLISH_ONLY to 'true' in repo Variables (Settings → Variables → Actions)
  # to always skip tests and just publish committed results.
  # Flip back to 'false' once your API is deployed.
  PUBLISH_ONLY: ${{ vars.PUBLISH_ONLY || 'false' }}

jobs:
  test:
    name: Run API Tests & Publish Allure Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        if: env.PUBLISH_ONLY != 'true' && github.event.inputs.publish_only != 'true'
        env:
          API_URL: ${{ secrets.API_URL }}
        run: mvn test -B
        continue-on-error: true

      - name: Skip tests (publish-only mode)
        if: env.PUBLISH_ONLY == 'true' || github.event.inputs.publish_only == 'true'
        run: echo "⏭️ Skipping test run — publishing committed allure-results as-is"

      - name: Load previous Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy history into results
        if: always()
        run: |
          if [ -d "gh-pages/history" ]; then
            mkdir -p target/allure-results/history
            cp -r gh-pages/history/. target/allure-results/history/
          fi

      - name: Install Allure CLI
        if: always()
        run: |
          curl -sLo allure.tgz https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Generate Allure report
        if: always()
        run: |
          allure generate target/allure-results \
            --clean \
            --output allure-report

      - name: Prepare Pages output
        if: always()
        run: |
          mkdir -p allure-history
          # Each run gets its own subfolder for history browsing
          cp -r allure-report allure-history/${{ github.run_number }}
          # Root index redirects to the latest run
          cat > allure-history/index.html <<EOF
          <!DOCTYPE html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=./${{ github.run_number }}/index.html">
          EOF
          # Carry history data forward so trend graphs keep working
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history allure-history/${{ github.run_number }}/history
          fi
          if [ -d "allure-report/history" ]; then
            cp -r allure-report/history allure-history/history
          fi

      - name: Deploy report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: true

      - name: Post report URL to summary
        if: always()
        run: |
          REPO="${{ github.repository }}"
          OWNER=$(echo "$REPO" | cut -d'/' -f1)
          REPO_NAME=$(echo "$REPO" | cut -d'/' -f2)
          echo "## 📊 Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View full Allure report](https://${OWNER}.github.io/${REPO_NAME})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$PUBLISH_ONLY" = "true" ]; then
            echo "> ⚠️ Published from committed results — tests were skipped" >> $GITHUB_STEP_SUMMARY
          fi